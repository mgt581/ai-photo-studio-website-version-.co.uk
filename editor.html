<style>
/* Image preview with transparent background support */
.image-preview {
    position: relative;
    display: block;
    margin: 22px auto;
    background-color: rgba(248,250,252,.94);
    background-image: linear-gradient(45deg, #ccc 25%, transparent 25%),
                      linear-gradient(-45deg, #ccc 25%, transparent 25%),
                      linear-gradient(45deg, transparent 75%, #ccc 75%),
                      linear-gradient(-45deg, transparent 75%, #ccc 75%);
    background-size: 20px 20px;
    background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
    padding: 14px;
    border-radius: 16px;
    border: 1px solid rgba(148, 163, 184, 0.18);
    box-shadow: 0 20px 40px rgba(0,0,0,.4);
}

.image-preview img {
    max-width: 100%;
    height: auto;
    display: block;
    background-color: transparent;
}

/* When transparent background is selected, show checkerboard */
.image-preview.transparent-bg {
    background-image: linear-gradient(45deg, #ccc 25%, transparent 25%),
                      linear-gradient(-45deg, #ccc 25%, transparent 25%),
                      linear-gradient(45deg, transparent 75%, #ccc 75%),
                      linear-gradient(-45deg, transparent 75%, #ccc 75%);
}

/* When color is selected, show solid color background */
.image-preview.color-bg {
    background-image: none;
}

.watermark {
    position: absolute;
    bottom: 10px;
    right: 10px;
    color: rgba(255, 255, 255, 0.7);
    font-size: 12px;
    pointer-events: none;
    text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
}

.tool-controls {
    min-height: 60px;
    padding: 15px;
    margin: 15px 0;
    color: var(--aips-secondary);
}

/* Color picker styles */
.color-picker-wrapper {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    padding: 15px;
    background: rgba(255,255,255,.04);
    border: 1px solid var(--aips-border);
    border-radius: 14px;
    margin: 10px 0;
}

.color-btn {
    width: 40px;
    height: 40px;
    border: 2px solid #ddd;
    border-radius: 50%;
    cursor: pointer;
    transition: transform 0.2s, border-color 0.2s;
}

.color-btn:hover {
    transform: scale(1.1);
    border-color: #333;
}

.color-btn.selected {
    box-shadow: 0 0 0 3px #007bff;
}

.transparent-btn {
    background: linear-gradient(45deg, #ccc 25%, transparent 25%),
                linear-gradient(-45deg, #ccc 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #ccc 75%),
                linear-gradient(-45deg, transparent 75%, #ccc 75%);
    background-size: 10px 10px;
    background-position: 0 0, 0 5px, 5px -5px, -5px 0px;
    font-size: 16px;
    color: #333;
    display: flex;
    align-items: center;
    justify-content: center;
}

.container {
    display: grid;
    gap: 18px;
}

.header {
    padding: 22px;
    text-align: center;
}

.header h1 {
    margin: 0;
    color: var(--aips-text);
    font-size: 28px;
}

.header p {
    margin: 6px 0 0;
    color: var(--aips-secondary);
}

.upload-box {
    padding: 22px;
    text-align: center;
    color: var(--aips-secondary);
    cursor: pointer;
}

.upload-box input {
    display: none;
}

.mode-switcher {
    display: grid;
    gap: 12px;
}

.download-btn {
    width: 100%;
}
</style>

<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Photo Studio – Editor</title>

    <link rel="stylesheet" href="style.css">

    <!-- ONNX RUNTIME -->
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>

    <!-- Android app detection (mirrors index.html logic) -->
    <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var forcedApp = (params.get('app') === '1') || (params.get('platform') === 'android');
      var ua = navigator.userAgent || '';
      var isAndroid = /Android/i.test(ua);
      var isWv = /\bwv\b/i.test(ua) || /Version\/\d+\.\d+.*Chrome\/\d+.*Mobile Safari/i.test(ua);
      var hasAndroidBridge = typeof window.Android !== 'undefined';
      var androidInterfaceActive = false;
      if (hasAndroidBridge) {
        try { androidInterfaceActive = window.Android && window.Android.isApp && window.Android.isApp() === true; } catch (e) {}
      }
      window.__AIPS_IS_ANDROID_APP__ = forcedApp || androidInterfaceActive || (isAndroid && (isWv || hasAndroidBridge));
    })();
    </script>
</head>

<body class="aips-page">

<div class="container aips-shell">
    
    <header class="header aips-card">
        <h1>AI Editor</h1>
        <p id="activeToolLabel">Loading tool…</p>
    </header>

    <button class="back-btn pill-btn" onclick="window.location.href='index.html'">← Back</button>

    <div class="upload-box aips-card" onclick="document.getElementById('imageInput').click()">
        <input type="file" id="imageInput" accept="image/*">
        <p>Tap to upload an image</p>
    </div>

    <div class="image-preview">
        <img id="editorImage" src="">
        <div id="watermark" class="watermark">AI Photo Studio</div>
    </div>

    <div class="mode-switcher">
        <button class="pill-btn" onclick="setMode('remove')">Remove Background</button>
        <button class="pill-btn" onclick="setMode('change')">Change Background</button>
        <button class="pill-btn" onclick="showColorPicker()">Choose Color</button>
        <button class="pill-btn" onclick="setMode('eraser')">Magic Eraser</button>
        <button class="pill-btn" onclick="setMode('person')">Remove Person</button>
    </div>

    <div id="toolControls" class="tool-controls"></div>

    <button class="download-btn pill-btn pill-btn-primary" id="saveBtn" onclick="downloadFinalImage()">Download Image</button>

</div>

<div id="loadingOverlay" class="loading-overlay" style="display:none;">
    <div class="loader"></div>
    <p>Processing…</p>
</div>

<script src="choose-bg.js"></script>
<script src="editor.js"></script>
<script>
  // Stub function to prevent console error - editor has its own color picker in mode controls
  function showColorPicker() {
    // The editor has a proper color picker in the mode controls
    // This is a fallback for any direct calls
    console.log("Color picker should be accessed via the 'Choose Color' mode button");
  }

  // Update save button label for Android users
  (function () {
    if (window.__AIPS_IS_ANDROID_APP__) {
      var btn = document.getElementById('saveBtn');
      if (btn) btn.textContent = 'Save to Device';
    }
  })();
</script>

</body>
</html>
