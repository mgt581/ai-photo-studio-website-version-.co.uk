<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Your Account • AI Photo Studio</title>
  <link rel="stylesheet" href="style.css">

<style>
    .box { max-width:420px; margin:28px auto; padding:26px; border-radius:16px; }
    h2 { color:var(--aips-text); margin:0 0 18px; font-size:28px; }
    .btn { display:block; width:100%; padding:13px 16px; border:1px solid var(--aips-border); border-radius:14px;
           background:var(--aips-primary); color:white; cursor:pointer; font-size:16px; font-weight:800;
           text-align:center; box-sizing: border-box; text-decoration: none; box-shadow:0 16px 34px rgba(37,99,235,.28); transition:all 0.2s }
    .btn:hover { filter:brightness(1.06) }
    .ghost { background:rgba(255,255,255,.05); border:1px solid var(--aips-border); color:var(--aips-text); box-shadow:none }
    .ghost:hover { background:rgba(255,255,255,.09) }
    .link-text { color:#93C5FD; text-decoration:none; font-weight:700; }
    #userInfo { color:var(--aips-secondary)!important; }
  </style>
</head>

<body class="aips-page">
  <div class="box aips-card">
    <h2>Your Account</h2>

    <a href="index.html" class="btn" style="margin-bottom:12px;">Home</a>

    <p id="userInfo" style="margin-bottom:20px; color:#555;">Loading user info...</p>

    <button class="btn ghost" onclick="logout()">Sign Out</button>

    <p style="text-align:center; margin-top:20px;">
      <a href="gallery.html" class="link-text">Go to your Gallery</a>
    </p>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCM6r66kW9xkBA5rgVcz4sP57N2v2BMbkg",
      authDomain: "ai-photo-studio-24354.firebaseapp.com",
      projectId: "ai-photo-studio-24354",
      storageBucket: "ai-photo-studio-24354.firebasestorage.app",
      messagingSenderId: "411346648650",
      appId: "1:411346648650:web:5ecd86ffecd05472fab0b3",
      measurementId: "G-R3G160W8BQ"
    };
    firebase.initializeApp(firebaseConfig);

    const auth = firebase.auth();

    // PROTECT PAGE
    auth.onAuthStateChanged(user => {
      if (!user) {
        // If testing locally with file://, this might trigger immediately
        // window.location.href = "signin.html"; 
        // Commented out the redirect for now so you can see the page structure
        document.getElementById("userInfo").textContent = "Not signed in (Local Test)";
        return;
      }

      document.getElementById("userInfo").textContent =
        "Signed in as: " + (user.email || "Unknown user");
    });

    function logout() {
      auth.signOut().then(() => {
        window.location.href = "signin.html";
      });
    }
  </script>

</body>
</html>
